server:
  port: 8085
spring:
  application:
    name: notification-service
  rabbitmq:
    host: localhost
    port: 5672
    username: book_user
    password: book_password

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    chat-id: ${TELEGRAM_CHAT_ID}
    api-url: https://api.telegram.org


management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    correlation: "[traceId=%X{traceId:-} spanId=%X{spanId:-} orderId=%X{orderId:-}] "

springdoc:
  api-docs:
    path: /v3/api-docs