
  server:
    port: 8085

  spring:
    application:
      name: notification-service

    profiles:
      active: ${SPRING_PROFILES_ACTIVE:dev}

  telegram:
    bot:
      token: ${TELEGRAM_BOT_TOKEN}
      chat-id: ${TELEGRAM_CHAT_ID}
      api-url: https://api.telegram.org

  management:
    endpoints:
      web:
        exposure:
          include: health, info, prometheus, metrics

    endpoint:
      health:
        show-details: always

    metrics:
      tags:
        application: ${spring.application.name}

    tracing:
      sampling:
        probability: 1.0

  logging:
    pattern:
      correlation: "[traceId=%X{traceId:-} spanId=%X{spanId:-} orderId=%X{orderId:-}] "

  springdoc:
    api-docs:
      path: /v3/api-docs

